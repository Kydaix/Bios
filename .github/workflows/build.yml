name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Bios.sln

      - name: Publish single-file exe
        run: >
          dotnet publish src/Bios.App/Bios.App.csproj
          -c Release -r win-x64 -o publish
          -p:DebugType=None -p:DebugSymbols=false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BiosTuner
          path: publish/BiosTuner.exe
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/BiosTuner.exe
          generate_release_notes: true
